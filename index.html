<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#06060e"/>
<title>NOCTUA</title>
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:#06060e;color:#e2e8f0;font-family:'Noto Sans JP',sans-serif;min-height:100svh;overscroll-behavior:none}
input,button,select,textarea{font-family:inherit}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#2d1f5e;border-radius:3px}
button{cursor:pointer;-webkit-tap-highlight-color:transparent}

@keyframes pulse-ring{
0%{box-shadow:0 0 0 0 rgba(167,139,250,.55)}
70%{box-shadow:0 0 0 9px rgba(167,139,250,0)}
100%{box-shadow:0 0 0 0 rgba(167,139,250,0)}
}
@keyframes slide-up{from{transform:translateY(42px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toast-in{from{transform:translate(-50%,12px);opacity:0}to{transform:translate(-50%,0);opacity:1}}

/* –– 背景 –– */
#bg{position:fixed;inset:0;pointer-events:none;z-index:0;
background:radial-gradient(ellipse 90% 55% at 50% -8%,rgba(88,28,235,.22) 0%,transparent 65%)}

/* –– ローダー –– */
#loader{position:fixed;inset:0;z-index:9000;background:#06060e;
display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.lr{width:38px;height:38px;border:3px solid rgba(124,58,237,.22);
border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite}
.lt{font-size:11px;color:#334155;letter-spacing:.1em}

/* –– ヘッダー –– */
#hdr{position:sticky;top:0;z-index:200;
display:flex;align-items:center;justify-content:space-between;
padding:0 14px;height:52px;
background:rgba(6,6,14,.93);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-bottom:1px solid rgba(124,58,237,.22)}
.logo{display:flex;align-items:center;gap:8px}
.logo-gem{color:#a78bfa;font-size:18px;filter:drop-shadow(0 0 8px #7c3aed)}
.logo-txt{font-family:‘Cinzel’,serif;font-size:16px;font-weight:700;letter-spacing:.15em}
.hdr-r{display:flex;gap:16px}
.hs{text-align:center}
.hs-n{font-size:15px;font-weight:700;line-height:1.1}
.hs-l{font-size:9px;color:#475569;letter-spacing:.04em}

/* –– タブバー –– */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:200;
display:flex;background:rgba(6,6,14,.95);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
border-top:1px solid rgba(124,58,237,.18);
padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:8px 4px 6px;font-size:9px;color:#475569;letter-spacing:.04em;
background:none;border:none;min-height:52px;transition:color .15s}
.nb.on{color:#a78bfa}
.nb svg{width:20px;height:20px;stroke:currentColor;fill:none;
stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin-bottom:3px}

/* –– ページ –– */
.page{display:none;padding:12px 12px 82px;position:relative;z-index:1;min-height:calc(100svh - 52px)}
.page.on{display:block}

/* –– セクション見出し –– */
.sec-hdr{display:flex;align-items:center;gap:7px;
font-size:10px;font-weight:700;color:#64748b;
letter-spacing:.1em;text-transform:uppercase;margin:14px 0 9px}
.sec-dot{width:6px;height:6px;border-radius:50%;
background:#7c3aed;box-shadow:0 0 7px #7c3aed;
flex-shrink:0;display:inline-block}

/* –– 卓グリッド –– */
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(152px,1fr));gap:10px;margin-bottom:10px}

/* –– 卓カード –– */
.tc{position:relative;border-radius:14px;padding:13px 12px 11px;
border:1px solid rgba(255,255,255,.07);background:rgba(13,13,22,.82);
min-height:112px;transition:transform .12s;
-webkit-tap-highlight-color:transparent;cursor:pointer}
.tc:active{transform:scale(.97)}
.tc.act{border-color:rgba(124,58,237,.52);background:rgba(124,58,237,.09)}
.tc.warn{border-color:rgba(245,158,11,.52);background:rgba(245,158,11,.07)}
.tc.over{border-color:rgba(239,68,68,.55);background:rgba(239,68,68,.08)}
.tc-pulse{position:absolute;top:10px;right:10px;width:8px;height:8px;
border-radius:50%;background:#7c3aed;animation:pulse-ring 2s infinite}
.tc-pulse.warn{background:#f59e0b}
.tc-pulse.over{background:#ef4444}
.tc-name{font-size:14px;font-weight:700;margin-bottom:5px;padding-right:18px}
.tc-gid{font-size:10px;color:#7c3aed;margin-bottom:7px;letter-spacing:.03em}
.tc-cr-tag{color:#fbbf24;font-size:9px;margin-left:4px}
.tc-row{display:flex;gap:6px;margin-bottom:7px}
.tc-st{flex:1;text-align:center}
.tc-st-l{font-size:8px;color:#475569;font-weight:700}
.tc-st-v{font-size:14px;font-weight:700}
.tc-rem{font-size:12px;font-weight:700;text-align:center;margin-top:2px}
.tc-cast{font-size:10px;color:#c084fc;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-memo{font-size:10px;color:#64748b;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-plus{font-size:26px;color:#1a1a2e;display:block;text-align:center;padding:10px 0 2px;font-weight:300}
.tc-elbl{font-size:10px;color:#2d2d44;text-align:center;letter-spacing:.06em}
.tc-ebadge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 6px;
border-radius:4px;background:rgba(100,116,139,.12);color:#3d4f63;
border:1px solid rgba(100,116,139,.15);font-weight:700}
.tc-cr{position:absolute;bottom:8px;right:8px;font-size:9px;font-weight:700;
padding:3px 8px;border-radius:5px;background:rgba(245,158,11,.14);
color:#fbbf24;border:1px solid rgba(245,158,11,.28)}

/* –– ダッシュボード –– */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.dc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:13px 12px}
.dc.full{grid-column:1/-1}
.dc-l{font-size:9px;color:#64748b;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.dc-v{font-size:22px;font-weight:700;line-height:1.1}
.dc-s{font-size:11px;color:#64748b;margin-top:4px}

/* –– 設定 –– */
.stg{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:14px;margin-bottom:12px}
.stg-t{font-size:11px;font-weight:700;color:#a78bfa;letter-spacing:.09em;text-transform:uppercase;margin-bottom:12px}
.stg-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.stg-row:last-child{border-bottom:none}
.stg-l{font-size:13px;color:#94a3b8}
.stg-v{font-size:13px;color:#a78bfa;font-weight:700}

/* –– モーダル –– */
.overlay{position:fixed;inset:0;z-index:500;
background:rgba(0,0,0,.72);
backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
display:flex;align-items:flex-end;animation:fade-in .18s ease}
.sheet{width:100%;max-height:95svh;background:#0b0b18;
border-top:1px solid rgba(124,58,237,.32);
border-radius:20px 20px 0 0;
padding-bottom:env(safe-area-inset-bottom,16px);
overflow:hidden;display:flex;flex-direction:column;
box-shadow:0 -10px 50px rgba(124,58,237,.2);animation:slide-up .22s ease}
.sh{display:flex;justify-content:center;padding:10px 0 0}
.sh-bar{width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.13)}
.s-hdr{display:flex;justify-content:space-between;align-items:flex-start;
padding:11px 16px 13px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.s-title{font-size:18px;font-weight:700}
.s-subs{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.s-close{background:rgba(255,255,255,.07);border:none;color:#94a3b8;
width:36px;height:36px;border-radius:8px;font-size:15px;
display:flex;align-items:center;justify-content:center;flex-shrink:0}
.s-body{overflow-y:auto;padding:14px 16px 16px;flex:1;-webkit-overflow-scrolling:touch}

/* –– フォーム –– */
.slbl{font-size:10px;font-weight:700;color:#475569;letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;margin-top:2px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
border-radius:10px;padding:13px;color:#e2e8f0;font-size:16px;outline:none;margin-bottom:13px}
.inp:focus{border-color:rgba(124,58,237,.5)}
.inp-sm{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
border-radius:9px;padding:11px 12px;color:#e2e8f0;font-size:16px;outline:none}
.inp-sm:focus{border-color:rgba(124,58,237,.5)}
.inp-pfx{position:relative}
.inp-pfx-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);
color:#64748b;font-weight:700;pointer-events:none;font-size:15px}
.inp-pfx .inp-sm{padding-left:24px;width:100%}
.ta{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
border-radius:10px;padding:12px 13px;color:#e2e8f0;font-size:15px;
outline:none;resize:none;margin-bottom:13px;min-height:68px}
.sel{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
border-radius:10px;padding:13px;color:#e2e8f0;font-size:16px;
outline:none;margin-bottom:13px;-webkit-appearance:none}
.sel option{background:#0b0b18}

/* –– ボタン –– */
.btn{display:inline-flex;align-items:center;justify-content:center;
border-radius:10px;border:1px solid transparent;
min-height:48px;padding:10px 14px;font-size:14px;font-weight:700;
transition:opacity .12s,transform .1s;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.72;transform:scale(.96)}
.btn-f{width:100%}
.btn-pri{background:linear-gradient(135deg,rgba(124,58,237,.78),rgba(167,139,250,.52));
color:#fff;border:none;box-shadow:0 4px 20px rgba(124,58,237,.26);
min-height:52px;font-size:15px;letter-spacing:.05em}
.btn-sec{background:rgba(255,255,255,.07);color:#94a3b8;border:1px solid rgba(255,255,255,.1)}
.btn-warn{background:rgba(245,158,11,.18);color:#fef3c7;border:1px solid rgba(245,158,11,.42)}
.btn-danger{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.38)}
.btn-danger:disabled{background:rgba(100,116,139,.1);color:#3d4f63;
border-color:rgba(100,116,139,.15);cursor:not-allowed;opacity:.6}
.btn-green{background:rgba(52,211,153,.14);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.btn-purple{background:rgba(124,58,237,.18);color:#a78bfa;border:1px solid rgba(124,58,237,.32)}
.btn-join{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.28);flex:1}
.btn-leave{background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.28);flex:1}
.bgrp{display:flex;gap:7px;margin-bottom:13px}
.btn-counts{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.btn-c{flex:1 1 44px;min-height:50px;font-size:14px;
background:rgba(124,58,237,.12);color:#a78bfa;
border:1px solid rgba(124,58,237,.22);border-radius:10px;font-weight:700;
-webkit-tap-highlight-color:transparent;transition:all .12s}
.btn-c:active{transform:scale(.95)}
.btn-c.on{background:rgba(124,58,237,.55);color:#fff;border-color:rgba(124,58,237,.72)}
.btn-shimei{flex:1;min-height:54px;border-radius:10px;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
background:rgba(232,121,249,.07);color:#c084fc;border:1px solid rgba(232,121,249,.18);
font-size:12px;font-weight:700;-webkit-tap-highlight-color:transparent;transition:all .12s}
.btn-shimei:active{transform:scale(.95)}
.btn-shimei.on{background:rgba(232,121,249,.22);color:#f0abfc;border-color:rgba(232,121,249,.45)}
.sp{font-size:10px;font-weight:500;opacity:.8}
.btn-pay{flex:1;min-height:56px;border-radius:12px;font-size:14px;font-weight:700;
-webkit-tap-highlight-color:transparent;transition:all .12s}
.btn-pay:active{transform:scale(.96)}
.bp-cash{background:rgba(251,191,36,.28);color:#fef3c7;border:2px solid rgba(251,191,36,.58)}
.bp-card{background:rgba(167,139,250,.28);color:#ede9fe;border:2px solid rgba(167,139,250,.55)}
.bp-off{background:rgba(255,255,255,.04);color:#3d4f63;border:1px solid rgba(255,255,255,.06)}

/* –– バッジ –– */
.bdg{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}

/* –– ステータスボックス –– */
.strow{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:13px}
.stbox{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
border-radius:10px;padding:9px 4px;text-align:center}
.sb-l{font-size:8px;color:#64748b;font-weight:700;margin-bottom:2px}
.sb-v{font-size:21px;font-weight:700;line-height:1}
.sb-u{font-size:9px;font-weight:400}

/* –– 時間バー –– */
.tbar{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px;
padding:11px;border-radius:10px;
background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.05)}
.ti{text-align:center}
.ti-l{font-size:8px;color:#475569;font-weight:700;margin-bottom:2px}
.ti-v{font-size:13px;font-weight:700;color:#94a3b8}

/* –– ログ –– */
.logbox{max-height:100px;overflow-y:auto;padding:7px;
border-radius:9px;background:rgba(0,0,0,.28);margin-bottom:13px}
.li{display:flex;gap:8px;font-size:11px;margin-bottom:3px;align-items:center}
.li-t{font-weight:700;min-width:30px}
.li-tm{color:#475569}
.li-i{color:#94a3b8}

/* –– 会計テーブル –– */
.billtbl{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);
border-radius:12px;overflow:hidden;margin-bottom:14px}
.br{display:flex;justify-content:space-between;align-items:center;
padding:10px 13px;border-bottom:1px solid rgba(255,255,255,.04)}
.br:last-child{border-bottom:none}
.br-l{font-size:12px;color:#64748b}
.br-v{font-size:13px;font-weight:500;color:#94a3b8}
.br.bold .br-l{color:#e2e8f0;font-weight:700}
.br.bold .br-v{font-size:16px;font-weight:700;color:#e2e8f0}

/* –– CRリスト –– */
.cr-scr{max-height:52svh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.cr-item{display:flex;align-items:center;gap:9px;padding:11px;
border-radius:10px;margin-bottom:7px;
background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06)}
.cr-inf{flex:1}
.cr-gid{font-size:11px;color:#a78bfa;font-weight:700;margin-bottom:3px}
.cr-det{font-size:10px;color:#64748b}
.cr-memo{font-size:10px;color:#7c3aed}

/* –– 確認チェック –– */
.ck-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ck-row input[type=checkbox]{width:22px;height:22px;accent-color:#7c3aed;flex-shrink:0}
.ck-row label{font-size:13px;color:#94a3b8}

/* –– 席移動 –– */
.move-btn{display:block;width:100%;padding:12px 14px;border-radius:10px;
background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);
color:#e2e8f0;font-size:14px;font-weight:600;text-align:left;
-webkit-tap-highlight-color:transparent;margin-bottom:7px;transition:all .12s}
.move-btn:active{transform:scale(.98)}

/* –– トースト –– */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);
padding:9px 20px;border-radius:10px;color:#fff;font-weight:700;font-size:13px;
z-index:9999;white-space:nowrap;box-shadow:0 4px 24px rgba(0,0,0,.5);
animation:toast-in .2s ease;pointer-events:none;display:none}

/* –– 区切り –– */
.divider{border:none;border-top:1px solid rgba(255,255,255,.06);margin:14px 0}
.row2{display:flex;gap:8px;align-items:center;margin-bottom:13px}
.searchbar{width:100%;background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.09);border-radius:10px;
padding:12px 13px;color:#e2e8f0;font-size:16px;
outline:none;margin-bottom:12px}
.searchbar:focus{border-color:rgba(124,58,237,.45)}
</style>

</head>
<body>
<div id="bg"></div>

<!-- ローダー -->

<div id="loader">
  <div class="lr"></div>
  <div class="lt">LOADING...</div>
</div>

<!-- トースト -->

<div id="toast"></div>

<!-- ヘッダー -->

<header id="hdr">
  <div class="logo">
    <span class="logo-gem">&#9670;</span>
    <span class="logo-txt">NOCTUA</span>
  </div>
  <div class="hdr-r">
    <div class="hs"><div class="hs-n" id="hs-act" style="color:#a78bfa">0</div><div class="hs-l">&#31295;&#20685;</div></div>
    <div class="hs"><div class="hs-n" id="hs-sal" style="color:#fbbf24">&#165;0</div><div class="hs-l">&#26412;&#26085;&#22770;&#19978;</div></div>
    <div class="hs"><div class="hs-n" id="hs-clk" style="color:#94a3b8">--:--</div><div class="hs-l">&#29694;&#22312;</div></div>
  </div>
</header>

<!-- ページ: 席管理 -->

<div id="pg-floor" class="page on">
  <div id="floor-body"></div>
</div>

<!-- ページ: ダッシュボード -->

<div id="pg-dash" class="page">
  <div class="dash-grid">
    <div class="dc">
      <div class="dc-l">&#26412;&#26085;&#22770;&#19978;</div>
      <div class="dc-v" id="d-sales" style="color:#fbbf24">&#165;0</div>
      <div class="dc-s" id="d-sales-s">&#20250;&#35336;&#28168;&#12415; 0&#32068;</div>
    </div>
    <div class="dc">
      <div class="dc-l">&#24179;&#22343;&#23458;&#21333;&#20385;</div>
      <div class="dc-v" id="d-avg" style="color:#a78bfa">&#165;0</div>
      <div class="dc-s" id="d-avg-s"></div>
    </div>
    <div class="dc">
      <div class="dc-l">&#31295;&#20685;&#20013;</div>
      <div class="dc-v" id="d-act">0&#32068;</div>
      <div class="dc-s" id="d-act2">0&#21517; &#31295;&#20685;&#20013;</div>
    </div>
    <div class="dc">
      <div class="dc-l">&#26412;&#26085;&#32013;&#35336;</div>
      <div class="dc-v" id="d-tot">0&#32068;</div>
      <div class="dc-s" id="d-tot2">0&#21517;</div>
    </div>
    <div class="dc full">
      <div class="dc-l">&#20250;&#35336;&#23653;&#27508;</div>
      <div id="d-hist" style="margin-top:8px;font-size:12px;color:#475569">&#12414;&#12384;&#12354;&#12426;&#12414;&#12379;&#12435;</div>
    </div>
  </div>
</div>

<!-- ページ: 設定 -->

<div id="pg-settings" class="page">
  <div class="stg">
    <div class="stg-t">&#26009;&#37329;&#35373;&#23450;</div>
    <div class="stg-row"><span class="stg-l">&#12475;&#12483;&#12488;&#26178;&#38291;</span><span class="stg-v" id="c-smin">40&#20998;</span></div>
    <div class="stg-row"><span class="stg-l">&#12475;&#12483;&#12488;&#26009;&#37329;</span><span class="stg-v" id="c-sprc">&#165;3,000</span></div>
    <div class="stg-row"><span class="stg-l">&#28040;&#36027;&#31налог;</span><span class="stg-v" id="c-tax">10%</span></div>
    <div class="stg-row"><span class="stg-l">&#12469;&#12540;&#12499;&#12473;&#26009;</span><span class="stg-v" id="c-svc">10%</span></div>

<div id="modal-root"></div>

<script>
'use strict';

/* =====================================================
   DB 初期化
   ===================================================== */
var db;
try {
  db = new Dexie('NoctuaV4');
  db.version(1).stores({
    settings:   '++id',
    tables_m:   '++id, tid, section',
    vgroups:    '++id, gid, status, date',
    vhists:     '++id, gid, tid',
    count_logs: '++id, gid',
    billings:   '++id, gid, date'
  });
} catch(e) {
  alert('DBの初期化に失敗しました: ' + e.message);
}

/* =====================================================
   デフォルト設定
   ===================================================== */
var DEF = {
  set_min:40, set_price:3000,
  tax:0.10, svc:0.10, card_tax:0.10,
  hon:3000, banai:1500, dohan:5000
};
var CFG = {
  set_min:40, set_price:3000,
  tax:0.10, svc:0.10, card_tax:0.10,
  hon:3000, banai:1500, dohan:5000
};

/* =====================================================
   デフォルト卓
   ===================================================== */
var DEFAULT_TABLES = [
  {tid:'T1', name:'1番卓', section:'VIP',       type:'ボックス'},
  {tid:'T2', name:'2番卓', section:'VIP',       type:'ボックス'},
  {tid:'T3', name:'3番卓', section:'メイン',    type:'ボックス'},
  {tid:'T4', name:'4番卓', section:'メイン',    type:'ボックス'},
  {tid:'T5', name:'5番卓', section:'メイン',    type:'ボックス'},
  {tid:'T6', name:'6番卓', section:'カウンター',type:'カウンター'},
  {tid:'T7', name:'7番卓', section:'カウンター',type:'カウンター'},
  {tid:'T8', name:'8番卓', section:'カウンター',type:'カウンター'}
];

/* =====================================================
   アプリ状態
   ===================================================== */
var ST = {
  tables:[], groups:[], hists:[], logs:[], bills:[],
  selTid: null,
  ni_count: 2,
  ni_type: 'free',
  ni_memo: '',
  ni_time: '',
  bill_ok: false,
  cr_search: '',
  pay_method: 'cash'
};

/* =====================================================
   ユーティリティ
   ===================================================== */
function gel(id) { return document.getElementById(id); }

function fmtYen(n) {
  return '\u00a5' + Math.round(n || 0).toLocaleString('ja-JP');
}

function pad2(n) { return String(n).padStart(2, '0'); }

function fmtTime(iso) {
  if (!iso) return '--:--';
  var d = new Date(iso);
  return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
}

function todayStr() {
  var n = new Date();
  return '' + n.getFullYear() + pad2(n.getMonth() + 1) + pad2(n.getDate());
}

function nowISO() { return new Date().toISOString(); }

function nowTimeStr() {
  var n = new Date();
  return pad2(n.getHours()) + ':' + pad2(n.getMinutes());
}

function timeToISO(hhmm) {
  var parts = hhmm.split(':');
  var h = parseInt(parts[0]) || 0;
  var m = parseInt(parts[1]) || 0;
  var d = new Date();
  d.setHours(h, m, 0, 0);
  if (h < 6) { d.setDate(d.getDate() + 1); }
  return d.toISOString();
}

function genGid(existing) {
  var td = todayStr();
  var nums = [];
  for (var i = 0; i < existing.length; i++) {
    var id = existing[i];
    if (id && id.indexOf(td) === 0) {
      var n = parseInt(id.split('-')[1] || '0');
      if (!isNaN(n)) nums.push(n);
    }
  }
  var next = nums.length > 0 ? Math.max.apply(null, nums) + 1 : 1;
  return td + '-' + pad2(pad2(next));
}

function calcSets(hists) {
  if (!hists.length) return 0;
  var base = null;
  for (var i = 0; i < hists.length; i++) {
    if (!hists[i].is_cr) { base = hists[i]; break; }
  }
  if (!base) base = hists[0];
  if (base.manual_sets != null) return base.manual_sets;
  var totalMs = 0;
  for (var j = 0; j < hists.length; j++) {
    var h = hists[j];
    var inn = new Date(h.check_in).getTime();
    var out = h.check_out ? new Date(h.check_out).getTime() : Date.now();
    totalMs += Math.max(0, out - inn);
  }
  return Math.max(1, Math.ceil(totalMs / 60000 / CFG.set_min));
}

function calcRem(checkIn, sets) {
  var exp = new Date(checkIn).getTime() + sets * CFG.set_min * 60000;
  return Math.round((exp - Date.now()) / 60000);
}

function fmtRem(min) {
  if (min <= 0) return {text: '超過' + Math.abs(min) + '分', cls: 'over'};
  if (min < 15) return {text: '残' + min + '分', cls: 'warn'};
  if (min < 60) return {text: '残' + min + '分', cls: ''};
  return {text: '残' + Math.floor(min / 60) + 'h' + (min % 60) + 'm', cls: ''};
}

function calcBill(sets, billing, shimeiPrc, food) {
  var setAmt  = CFG.set_price * billing * sets;
  var pre     = setAmt + (shimeiPrc || 0) + (food || 0);
  var svc     = Math.round(pre * CFG.svc);
  var taxAmt  = Math.round((pre + svc) * CFG.tax);
  var cashBig = Math.round(pre * (1 + CFG.svc) * (1 + CFG.tax));
  var cardBig = Math.round(cashBig * (1 + CFG.card_tax));
  var small   = Math.round(cashBig / ((1 + CFG.tax) * (1 + CFG.svc)));
  return {setAmt:setAmt, pre:pre, svc:svc, taxAmt:taxAmt, cashBig:cashBig, cardBig:cardBig, small:small};
}

var toastT = null;
function toast(msg, type) {
  var el = gel('toast');
  el.textContent = msg;
  el.style.display = 'block';
  if (type === 'err') {
    el.style.background = 'rgba(220,38,38,.93)';
  } else if (type === 'info') {
    el.style.background = 'rgba(109,40,217,.93)';
  } else {
    el.style.background = 'rgba(5,150,105,.93)';
  }
  clearTimeout(toastT);
  toastT = setTimeout(function() { el.style.display = 'none'; }, 3000);
}

function mkBadge(text, color, bg) {
  return '<span class="bdg" style="background:' + bg + ';color:' + color + ';border:1px solid ' + color + '55">' + text + '</span>';
}

/* =====================================================
   DB ロード
   ===================================================== */
function loadAll() {
  return Promise.all([
    db.settings.toCollection().last(),
    db.tables_m.toArray(),
    db.vgroups.toArray(),
    db.vhists.toArray(),
    db.count_logs.toArray(),
    db.billings.toArray()
  ]).then(function(res) {
    var cfg = res[0], tables = res[1], groups = res[2],
        hists = res[3], logs = res[4], bills = res[5];
    if (cfg) {
      CFG.set_min   = cfg.set_min   || DEF.set_min;
      CFG.set_price = cfg.set_price || DEF.set_price;
      CFG.tax       = cfg.tax       != null ? cfg.tax       : DEF.tax;
      CFG.svc       = cfg.svc       != null ? cfg.svc       : DEF.svc;
      CFG.card_tax  = cfg.card_tax  != null ? cfg.card_tax  : DEF.card_tax;
      CFG.hon       = cfg.hon       || DEF.hon;
      CFG.banai     = cfg.banai     || DEF.banai;
      CFG.dohan     = cfg.dohan     || DEF.dohan;
    }
    if (!tables.length) {
      var adds = [];
      for (var i = 0; i < DEFAULT_TABLES.length; i++) {
        adds.push(db.tables_m.add(DEFAULT_TABLES[i]));
      }
      return Promise.all(adds).then(function() {
        return db.tables_m.toArray();
      }).then(function(t) {
        ST.tables = t;
        ST.groups = groups; ST.hists = hists;
        ST.logs = logs; ST.bills = bills;
      });
    }
    ST.tables = tables; ST.groups = groups;
    ST.hists = hists; ST.logs = logs; ST.bills = bills;
  });
}

/* =====================================================
   ページ切替
   ===================================================== */
function showPg(pg) {
  var pages = document.querySelectorAll('.page');
  var nbs   = document.querySelectorAll('.nb');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('on');
  for (var j = 0; j < nbs.length; j++)   nbs[j].classList.remove('on');
  var map = {floor: 0, dash: 1, settings: 2};
  var pgEl = gel('pg-' + pg);
  if (pgEl) pgEl.classList.add('on');
  var nbList = document.querySelectorAll('.nb');
  if (nbList[map[pg]]) nbList[map[pg]].classList.add('on');
  if (pg === 'floor')    renderFloor();
  if (pg === 'dash')     renderDash();
  if (pg === 'settings') renderStg();
}

/* =====================================================
   ヘッダー更新
   ===================================================== */
function updateHdr() {
  var active = ST.hists.filter(function(h) { return !h.check_out; });
  gel('hs-act').textContent = active.length;
  var td = todayStr();
  var tb = ST.bills.filter(function(b) { return b.date === td; });
  var sales = 0;
  for (var i = 0; i < tb.length; i++) sales += (tb[i].cash_big || 0);
  gel('hs-sal').textContent = sales >= 10000
    ? '\u00a5' + Math.round(sales / 1000) + 'k'
    : fmtYen(sales);
  var n = new Date();
  gel('hs-clk').textContent = pad2(n.getHours()) + ':' + pad2(n.getMinutes());
}

/* =====================================================
   フロア描画
   ===================================================== */
function getActH(tid) {
  for (var i = 0; i < ST.hists.length; i++) {
    if (ST.hists[i].tid === tid && !ST.hists[i].check_out) return ST.hists[i];
  }
  return null;
}

function getGrpH(gid) {
  return ST.hists.filter(function(h) { return h.gid === gid; });
}

function renderFloor() {
  var secSet = [], secMap = {};
  for (var i = 0; i < ST.tables.length; i++) {
    var sec = ST.tables[i].section;
    if (!secMap[sec]) { secMap[sec] = true; secSet.push(sec); }
  }
  var closed = ST.groups.filter(function(g) { return g.status === 'closed'; });
  var html = '';
  for (var s = 0; s < secSet.length; s++) {
    var sec = secSet[s];
    html += '<div class="sec-hdr"><span class="sec-dot"></span>' + sec + '</div>';
    html += '<div class="tgrid">';
    for (var t = 0; t < ST.tables.length; t++) {
      var tbl = ST.tables[t];
      if (tbl.section !== sec) continue;
      var h = getActH(tbl.tid);
      if (h) {
        var gh   = getGrpH(h.gid);
        var sets = calcSets(gh);
        var rem  = calcRem(h.check_in, sets);
        var rf   = fmtRem(rem);
        var rc   = rf.cls === 'over' ? '#f87171' : rf.cls === 'warn' ? '#fbbf24' : '#34d399';
        var shimDisp = h.shimei_label ? ('♦' + h.shimei_label) : (h.is_free ? 'フリー' : '');
        var castDisp = h.cast_name ? (' / ' + h.cast_name) : '';
        html += '<div class="tc act ' + rf.cls + '" onclick="openManage(\'' + tbl.tid + '\')">';
        html += '<span class="tc-pulse ' + rf.cls + '"></span>';
        html += '<div class="tc-name">' + tbl.name + '</div>';
        html += '<div class="tc-gid">' + h.gid;
        if (h.is_cr) html += '<span class="tc-cr-tag">CR</span>';
        html += '</div>';
        html += '<div class="tc-row">';
        html += '<div class="tc-st"><div class="tc-st-l">現在</div><div class="tc-st-v">' + h.current_count + '<small style="font-size:9px">名</small></div></div>';
        html += '<div class="tc-st"><div class="tc-st-l">課金</div><div class="tc-st-v" style="color:#fbbf24">' + h.billing_count + '<small style="font-size:9px">名</small></div></div>';
        html += '<div class="tc-st"><div class="tc-st-l">SET</div><div class="tc-st-v" style="color:#a78bfa">' + sets + '</div></div>';
        html += '</div>';
        html += '<div class="tc-rem ' + rf.cls + '" style="color:' + rc + '">' + rf.text + '</div>';
        if (shimDisp) html += '<div class="tc-cast">' + shimDisp + castDisp + '</div>';
        if (h.memo)   html += '<div class="tc-memo">&#128221;' + h.memo + '</div>';
        html += '</div>';
      } else {
        html += '<div class="tc" onclick="openNew(\'' + tbl.tid + '\')">';
        html += '<div class="tc-name">' + tbl.name + '</div>';
        html += '<span class="tc-ebadge">空席</span>';
        html += '<span class="tc-plus">+</span>';
        html += '<div class="tc-elbl">案内する</div>';
        if (closed.length > 0) {
          html += '<button class="tc-cr" onclick="event.stopPropagation();openCR(\'' + tbl.tid + '\')">CR</button>';
        }
        html += '</div>';
      }
    }
    html += '</div>';
  }
  gel('floor-body').innerHTML = html;
}

/* =====================================================
   モーダルヘルパー
   ===================================================== */
function showModal(html) {
  gel('modal-root').innerHTML =
    '<div class="overlay" onclick="closeModal()">' +
      '<div class="sheet" onclick="event.stopPropagation()">' + html + '</div>' +
    '</div>';
}

function closeModal() {
  gel('modal-root').innerHTML = '';
}

function mkHandle() {
  return '<div class="sh"><div class="sh-bar"></div></div>';
}

function mkHdr(title, sub) {
  var subHtml = sub ? ('<div class="s-subs">' + sub + '</div>') : '';
  return '<div class="s-hdr">' +
    '<div><div class="s-title">' + title + '</div>' + subHtml + '</div>' +
    '<button class="s-close" onclick="closeModal()">✕</button>' +
    '</div>';
}

/* =====================================================
   新規入店
   ===================================================== */
function openNew(tid) {
  ST.selTid   = tid;
  ST.ni_count = 2;
  ST.ni_type  = 'free';
  ST.ni_memo  = '';
  ST.ni_time  = nowTimeStr();
  renderNewModal();
}

function renderNewModal() {
  var tbl = null;
  for (var i = 0; i < ST.tables.length; i++) {
    if (ST.tables[i].tid === ST.selTid) { tbl = ST.tables[i]; break; }
  }
  if (!tbl) return;
  var counts = '';
  for (var n = 1; n <= 6; n++) {
    counts += '<button class="btn-c ' + (ST.ni_count === n ? 'on' : '') +
      '" onclick="niCount(' + n + ')">' + n + '名</button>';
  }
  var honCls  = ST.ni_type === 'hon'  ? 'btn-purple' : 'btn-sec';
  var freCls  = ST.ni_type === 'free' ? 'btn-purple' : 'btn-sec';
  var body = mkHandle() + mkHdr(tbl.name + ' — 新規入店') +
    '<div class="s-body">' +
      '<div class="slbl">入店時間（5分単位）</div>' +
      '<input class="inp" type="time" id="ni-time" step="300" value="' + ST.ni_time + '" oninput="ST.ni_time=this.value"/>' +
      '<div class="slbl">入店人数</div>' +
      '<div class="btn-counts">' + counts + '</div>' +
      '<div class="slbl">本指名 / フリー</div>' +
      '<div class="bgrp">' +
        '<button class="btn ' + honCls + '" onclick="niType(\'hon\')">&#9670; 本指名</button>' +
        '<button class="btn ' + freCls + '" onclick="niType(\'free\')">フリー</button>' +
      '</div>' +
      '<div class="slbl">メモ（予約名など）</div>' +
      '<input class="inp" type="text" placeholder="任意" value="' + ST.ni_memo + '" oninput="ST.ni_memo=this.value"/>' +
      '<button class="btn btn-pri btn-f" onclick="doNewEntry()">入店処理を確定</button>' +
    '</div>';
  showModal(body);
}

function niCount(n) {
  ST.ni_count = n;
  renderNewModal();
}

function niType(t) {
  ST.ni_type = t;
  renderNewModal();
}

function doNewEntry() {
  var allGids = [];
  for (var i = 0; i < ST.groups.length; i++) allGids.push(ST.groups[i].gid);
  var gid     = genGid(allGids);
  var timeEl  = gel('ni-time');
  var timeVal = timeEl ? timeEl.value : nowTimeStr();
  var checkIn = timeToISO(timeVal);
  var n  = ST.ni_count;
  var td = todayStr();

  db.transaction('rw', [db.vgroups, db.vhists, db.count_logs], function() {
    db.vgroups.add({
      gid: gid, status: 'active', date: td,
      entry_count: n, total_billing: n,
      memo: ST.ni_memo, created_at: nowISO()
    });
    db.vhists.add({
      gid: gid, tid: ST.selTid,
      check_in: checkIn, check_out: null,
      entry_count: n, current_count: n, billing_count: n,
      set_min: CFG.set_min, manual_sets: null,
      is_cr: false, sequence: 1,
      is_free: ST.ni_type === 'free',
      shimei_label: null, shimei_price: 0,
      cast_name: '', food_amount: 0, memo: ST.ni_memo
    }).then(function(hid) {
      db.count_logs.add({
        gid: gid, hist_id: hid,
        change_type: 'entry', delta: n,
        current_count: n, billing_count: n,
        logged_at: checkIn
      });
    });
  }).then(function() {
    closeModal();
    toast(gid + ' 入店完了');
    return refresh();
  }).catch(function(e) {
    toast('エラー: ' + e.message, 'err');
  });
}

/* =====================================================
   卓管理モーダル
   ===================================================== */
function openManage(tid) {
  ST.selTid = tid;
  renderManageModal();
}

function renderManageModal() {
  var tbl = null;
  for (var i = 0; i < ST.tables.length; i++) {
    if (ST.tables[i].tid === ST.selTid) { tbl = ST.tables[i]; break; }
  }
  var h = getActH(ST.selTid);
  if (!h || !tbl) { renderFloor(); return; }

  var gh   = getGrpH(h.gid);
  var sets = calcSets(gh);
  var rem  = calcRem(h.check_in, sets);
  var rf   = fmtRem(rem);
  var bill = calcBill(sets, h.billing_count, h.shimei_price || 0, h.food_amount || 0);
  var logs = ST.logs.filter(function(l) { return l.gid === h.gid; });
  var isCR = gh.some(function(x) { return x.is_cr; });
  var rc   = rf.cls === 'over' ? '#f87171' : rf.cls === 'warn' ? '#fbbf24' : '#34d399';

  /* ログHTML */
  var logsHtml = '';
  if (logs.length) {
    for (var li = 0; li < logs.length; li++) {
      var l = logs[li];
      var tc = l.change_type === 'entry' ? '#60a5fa' : l.change_type === 'join' ? '#34d399' : '#f87171';
      var tlbl = l.change_type === 'entry' ? '入店' : l.change_type === 'join' ? '合流' : '退席';
      logsHtml += '<div class="li">' +
        '<span class="li-t" style="color:' + tc + '">' + tlbl + '</span>' +
        '<span class="li-tm">' + fmtTime(l.logged_at) + '</span>' +
        '<span class="li-i">' + (l.delta > 0 ? '+' : '') + l.delta + '名 現在' + l.current_count + '名/課金' + l.billing_count + '名</span>' +
        '</div>';
    }
  } else {
    logsHtml = '<div style="color:#334155;font-size:11px;text-align:center">ログなし</div>';
  }

  /* 指名HTML */
  var shimeis = [
    {label:'本指名', price:CFG.hon},
    {label:'場内',   price:CFG.banai},
    {label:'同伴',   price:CFG.dohan}

/* =====================================================

function doCount(delta, type) {
var h = getActH(ST.selTid);
if (!h || h.id == null) return;
var newCur  = Math.max(1, h.current_count + (type === ‘leave’ ? -delta : delta));
var newBill = type === ‘join’ ? h.billing_count + delta : h.billing_count;
var now = nowISO();
db.transaction(‘rw’, [db.vhists, db.count_logs], function() {
db.vhists.update(h.id, {current_count: newCur, billing_count: newBill});
db.count_logs.add({
gid: h.gid, hist_id: h.id,
change_type: type, delta: delta,
current_count: newCur, billing_count: newBill,
logged_at: now
});
if (type === ‘join’) {
var g = null;
for (var i = 0; i < ST.groups.length; i++) {
if (ST.groups[i].gid === h.gid) { g = ST.groups[i]; break; }
}
if (g) db.vgroups.update(g.id, {total_billing: (g.total_billing || 0) + delta});
}
}).then(function() {
toast(type === ‘join’ ? ‘+’ + delta + ‘名 合流’ : ‘-’ + delta + ‘名 退席’, ‘info’);
return refresh();
}).then(function() {
renderManageModal();
}).catch(function(e) { toast(e.message, ‘err’); });
}

function doShimei(label, price) {

db.vhists.update(h.id, {

gel(‘d-act2’).textContent   = actPax + ‘名 稼働中’;
gel(‘d-tot’).textContent    = tg.length + ‘組’;
gel(‘d-tot2’).textContent   = guests + ‘名 累計’;

var histHtml = ‘’;
if (tb.length) {
var rev = tb.slice().reverse();
for (var n = 0; n < rev.length; n++) {
var b = rev[n];
var pc = b.pay_method === ‘cash’ ? ‘#fbbf24’ : ‘#a78bfa’;
histHtml +=
‘<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)">’ +
‘<div>’ +
‘<div style="font-size:12px;color:#a78bfa;font-weight:700">’ + b.gid + ‘</div>’ +
‘<div style="font-size:11px;color:#475569">’ +
fmtTime(b.confirmed_at) + ’ / ’ + b.sets + ’SET / ’ + b.billing_count + ’名 / ’ +
(b.pay_method === ‘cash’ ? ‘現金’ : ‘カード’) +
‘</div>’ +
‘</div>’ +
‘<div style="font-size:15px;font-weight:700;color:' + pc + '">’ + fmtYen(b.actual_amount) + ‘</div>’ +
‘</div>’;
}
} else {
histHtml = ‘<div style="color:#334155;padding:12px 0">まだありません</div>’;
}
gel(‘d-hist’).innerHTML = histHtml;
}

/* =====================================================
設定
===================================================== */
function renderStg() {
gel(‘c-smin’).textContent  = CFG.set_min + ‘分’;
gel(‘c-sprc’).textContent  = fmtYen(CFG.set_price);
gel(‘c-tax’).textContent   = (CFG.tax * 100).toFixed(0) + ‘%’;
gel(‘c-svc’).textContent   = (CFG.svc * 100).toFixed(0) + ‘%’;
gel(‘c-ctx’).textContent   = (CFG.card_tax * 100).toFixed(0) + ‘%’;
gel(‘c-hon’).textContent   = fmtYen(CFG.hon);
gel(‘c-ban’).textContent   = fmtYen(CFG.banai);
gel(‘c-doh’).textContent   = fmtYen(CFG.dohan);
}

function openStgEdit() {
var body = mkHandle() + mkHdr(‘料金設定を変更’) +
‘<div class="s-body">’ +
‘<div class="slbl">セット時間（分）</div>’ +
‘<input class="inp" type="number" inputmode="numeric" id="se-sm" value="' + CFG.set_min + '"/>’ +
‘<div class="slbl">セット料金（円/1名）</div>’ +
‘<input class="inp" type="number" inputmode="numeric" id="se-sp" value="' + CFG.set_price + '"/>’ +
‘<div class="slbl">消費税率（例: 0.10）</div>’ +
‘<input class="inp" type="number" inputmode="decimal" id="se-tx" step="0.01" value="' + CFG.tax + '"/>’ +
‘<div class="slbl">サービス料率（例: 0.10）</div>’ +
‘<input class="inp" type="number" inputmode="decimal" id="se-sv" step="0.01" value="' + CFG.svc + '"/>’ +
‘<div class="slbl">カードTAX率（例: 0.10）</div>’ +
‘<input class="inp" type="number" inputmode="decimal" id="se-ct" step="0.01" value="' + CFG.card_tax + '"/>’ +
‘<div class="slbl">本指名料金（円）</div>’ +
‘<input class="inp" type="number" inputmode="numeric" id="se-hn" value="' + CFG.hon + '"/>’ +
‘<div class="slbl">場内指名料金（円）</div>’ +
‘<input class="inp" type="number" inputmode="numeric" id="se-bn" value="' + CFG.banai + '"/>’ +
‘<div class="slbl">同伴料金（円）</div>’ +
‘<input class="inp" type="number" inputmode="numeric" id="se-dh" value="' + CFG.dohan + '"/>’ +
‘<button class="btn btn-pri btn-f" onclick="saveStg()">保存</button>’ +
‘</div>’;
showModal(body);
}

function saveStg() {
var nc = {
set_min:   parseInt(gel(‘se-sm’).value)   || 40,
set_price: parseInt(gel(‘se-sp’).value)   || 3000,
tax:       parseFloat(gel(‘se-tx’).value) || 0.10,
svc:       parseFloat(gel(‘se-sv’).value) || 0.10,
card_tax:  parseFloat(gel(‘se-ct’).value) || 0.10,
hon:       parseInt(gel(‘se-hn’).value)   || 3000,
banai:     parseInt(gel(‘se-bn’).value)   || 1500,
dohan:     parseInt(gel(‘se-dh’).value)   || 5000
};
db.settings.toCollection().last().then(function(ex) {
if (ex) return db.settings.update(ex.id, nc);
return db.settings.add(nc);
}).then(function() {
CFG.set_min   = nc.set_min;
CFG.set_price = nc.set_price;
CFG.tax       = nc.tax;
CFG.svc       = nc.svc;
CFG.card_tax  = nc.card_tax;
CFG.hon       = nc.hon;
CFG.banai     = nc.banai;
CFG.dohan     = nc.dohan;
closeModal();
toast(‘設定を保存しました’);
renderStg();
}).catch(function(e) { toast(e.message, ‘err’); });
}

function openClear() {
var body = mkHandle() + mkHdr(‘データリセット確認’) +
‘<div class="s-body">’ +
‘<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:14px;margin-bottom:16px;font-size:13px;color:#f87171">’ +
‘⚠ 全ての卓・組・会計データが削除されます。この操作は取り消せません。’ +
‘</div>’ +
‘<button class="btn btn-danger btn-f" onclick="doClear()">全データを削除する</button>’ +
‘<button class="btn btn-sec btn-f" style="margin-top:8px" onclick="closeModal()">キャンセル</button>’ +
‘</div>’;
showModal(body);
}

function doClear() {
Promise.all([
db.vgroups.clear(),
db.vhists.clear(),
db.count_logs.clear(),
db.billings.clear()
]).then(function() {
closeModal();
toast(‘データをリセットしました’, ‘info’);
return refresh();
}).catch(function(e) { toast(e.message, ‘err’); });
}

/* =====================================================
定期更新
===================================================== */
function refresh() {
return loadAll().then(function() {
updateHdr();
var fp = gel(‘pg-floor’);
var dp = gel(‘pg-dash’);
var sp = gel(‘pg-settings’);
if (fp && fp.classList.contains(‘on’)) renderFloor();
if (dp && dp.classList.contains(‘on’)) renderDash();
if (sp && sp.classList.contains(‘on’)) renderStg();
});
}

setInterval(function() {
loadAll().then(function() {
updateHdr();
var fp = gel(‘pg-floor’);
if (fp && fp.classList.contains(‘on’)) renderFloor();
var overlay = document.querySelector(’.overlay’);
if (overlay && ST.selTid) {
var h = getActH(ST.selTid);
if (!h) return;
var gh   = getGrpH(h.gid);
var sets = calcSets(gh);
var rem  = calcRem(h.check_in, sets);
var rf   = fmtRem(rem);
var rc   = rf.cls === ‘over’ ? ‘#f87171’ : rf.cls === ‘warn’ ? ‘#fbbf24’ : ‘#34d399’;
var bill = calcBill(sets, h.billing_count, h.shimei_price || 0, h.food_amount || 0);
var tiVs = document.querySelectorAll(’.ti-v’);
if (tiVs[1]) { tiVs[1].textContent = rf.text; tiVs[1].style.color = rc; }
if (tiVs[2]) { tiVs[2].textContent = fmtYen(bill.cashBig); }
}
});
}, 30000);

/* =====================================================
起動（ルール3: loaderを必ず非表示にする）
===================================================== */
window.onload = function() {
try {
loadAll().then(function() {
updateHdr();
renderFloor();
document.getElementById(‘loader’).style.display = ‘none’;
}).catch(function(e) {
alert(’起動エラー: ’ + e.message);
document.getElementById(‘loader’).style.display = ‘none’;
});
} catch(e) {
alert(’初期化エラー: ’ + e.message);
document.getElementById(‘loader’).style.display = ‘none’;
}
};
</script>

</body>
</html>
