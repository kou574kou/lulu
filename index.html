<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NOCTUA — Floor Management</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dexie/4.0.11/dexie.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* デザイン設定：高級感のあるダークモード */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #06060e; color: #e2e8f0; font-family: 'Noto Sans JP', sans-serif; min-height: 100svh; padding-bottom: 30px; }
    #header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 60px; background: rgba(6,6,14,.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(124,58,237,.3); }
    #logo-text { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; letter-spacing: .15em; color: #a78bfa; }
    #main { padding: 15px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    
    /* 卓カード */
    .table-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; padding: 15px; text-align: center; position: relative; min-height: 100px; }
    .table-card.active { border-color: #7c3aed; background: rgba(124,58,237,0.1); }
    .table-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .rem-time { font-size: 14px; font-weight: 700; color: #34d399; }
    .rem-time.warn { color: #fbbf24; }
    .rem-time.over { color: #ef4444; }

    /* モーダル */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.8); display: flex; align-items: flex-end; z-index: 1000; }
    .modal-sheet { width: 100%; max-height: 90vh; overflow-y: auto; background: #0d0d1a; border-top: 2px solid #7c3aed; border-radius: 20px 20px 0 0; padding: 20px; }
    .btn { padding: 12px; border-radius: 8px; border: none; font-weight: 700; margin: 5px 0; cursor: pointer; width: 100%; }
    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-secondary { background: #1e293b; color: #fff; border: 1px solid #334155; }
    .input { width: 100%; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: white; margin: 8px 0; font-size: 16px; }
    
    /* 会計詳細 */
    .bill-box { background: #161b22; padding: 15px; border-radius: 10px; margin-top: 10px; }
    .bill-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
    .total-row { font-size: 18px; font-weight: 700; color: #fbbf24; border-top: 1px solid #334155; margin-top: 8px; padding-top: 8px; }
  </style>
</head>
<body>

<header id="header">
  <div id="logo-text">NOCTUA</div>
  <div id="clock" style="font-weight: bold; color: #fbbf24;">00:00</div>
</header>

<main id="main"></main>
<div id="modal-root"></div>

<script>
  // 設定
  const SET_MINS = 40;
  const SET_PRICE = 3000;
  const TAX = 0.1, SVC = 0.1, CARD = 0.1;

  const db = new Dexie('NoctuaFullDB');
  db.version(1).stores({ tables: 'id', groups: '++id, groupId, status' });

  async function init() {
    for (let i=1; i<=8; i++) {
      const id = `${i}番卓`;
      if (!(await db.tables.get(id))) await db.tables.add({ id, status: 'empty', groupId: null });
    }
    render();
  }

  async function render() {
    const data = await db.tables.toArray();
    document.getElementById('main').innerHTML = data.map(t => {
      let extra = '';
      if (t.status === 'active') {
        const rem = Math.max(0, SET_MINS - Math.floor((Date.now() - t.startTime)/60000));
        extra = `<div class="rem-time ${rem < 10 ? 'warn' : ''}">${rem}分</div><div style="font-size:11px">${t.count}名 / ¥${t.food}</div>`;
      }
      return `<div class="table-card ${t.status === 'active' ? 'active' : ''}" onclick="openModal('${t.id}')">
        <div class="table-name">${t.id}</div>
        ${t.status === 'active' ? extra : '<div style="color:#475569; font-size:12px">空席</div>'}
      </div>`;
    }).join('');
  }

  async function openModal(id) {
    const t = await db.tables.get(id);
    const root = document.getElementById('modal-root');
    if (t.status === 'empty') {
      root.innerHTML = `<div class="modal-overlay" onclick="this.parentElement.innerHTML=''"><div class="modal-sheet" onclick="event.stopPropagation()">
        <h3>${id}：新規入店</h3>
        <input type="number" id="c" class="input" value="2" placeholder="人数" inputmode="numeric">
        <button class="btn btn-primary" onclick="start('${id}')">入店処理</button>
        <button class="btn btn-secondary" onclick="openCR('${id}')">CR（再入店）を検索</button>
      </div></div>`;
    } else {
      const sub = (SET_PRICE * t.count) + Number(t.food) + Number(t.shimei || 0);
      const cash = Math.floor(sub * (1+SVC) * (1+TAX));
      root.innerHTML = `<div class="modal-overlay" onclick="this.parentElement.innerHTML=''"><div class="modal-sheet" onclick="event.stopPropagation()">
        <h3>${id} 管理</h3>
        <div class="bill-box">
          <div class="bill-row"><span>人数</span><span>${t.count}名</span></div>
          <div class="bill-row"><span>指名料</span><input type="number" class="input" style="width:100px;margin:0" value="${t.shimei || 0}" onchange="upd('${id}','shimei',this.value)"></div>
          <div class="bill-row"><span>ボトル・飲食</span><input type="number" class="input" style="width:100px;margin:0" value="${t.food}" onchange="upd('${id}','food',this.value)"></div>
          <div class="bill-row total-row"><span>現金合計</span><span>¥${cash.toLocaleString()}</span></div>
          <div class="bill-row" style="color:#a78bfa"><span>カード合計</span><span>¥${Math.floor(cash*(1+CARD)).toLocaleString()}</span></div>
        </div>
        <button class="btn btn-secondary" onclick="addCount('${id}', 1)">人数追加 (+1)</button>
        <button class="btn btn-primary" style="background:#f59e0b" onclick="checkout('${id}')">会計確定・退店</button>
        <button class="btn btn-secondary" onclick="document.getElementById('modal-root').innerHTML=''">閉じる</button>
      </div></div>`;
    }
  }

  async function start(id) {
    const c = document.getElementById('c').value;
    const gId = 'G' + Date.now().toString().slice(-6);
    await db.tables.update(id, { status: 'active', groupId: gId, count: Number(c), food: 0, shimei: 0, startTime: Date.now() });
    await db.groups.add({ groupId: gId, status: 'active' });
    document.getElementById('modal-root').innerHTML = '';
    render();
  }

  async function upd(id, key, val) {
    let data = {}; data[key] = Number(val);
    await db.tables.update(id, data);
    openModal(id);
    render();
  }

  async function addCount(id, n) {
    const t = await db.tables.get(id);
    await db.tables.update(id, { count: t.count + n });
    openModal(id);
    render();
  }

  async function checkout(id) {
    if (!confirm('会計を確定しますか？')) return;
    const t = await db.tables.get(id);
    await db.groups.where('groupId').equals(t.groupId).modify({ status: 'closed' });
    await db.tables.update(id, { status: 'empty', groupId: null });
    document.getElementById('modal-root').innerHTML = '';
    render();
  }

  async function openCR(id) {
    const closed = await db.groups.where('status').equals('closed').toArray();
    const root = document.getElementById('modal-root');
    root.innerHTML = `<div class="modal-overlay" onclick="this.parentElement.innerHTML=''"><div class="modal-sheet" onclick="event.stopPropagation()">
      <h3>CR選択</h3>
      ${closed.map(g => `<button class="btn btn-secondary" onclick="reEnter('${id}','${g.groupId}')">${g.groupId} を再入店</button>`).join('')}
      <button class="btn btn-primary" onclick="openModal('${id}')">戻る</button>
    </div></div>`;
  }

  async function reEnter(tid, gid) {
    await db.tables.update(tid, { status: 'active', groupId: gid, count: 2, food: 0, shimei: 0, startTime: Date.now() });
    await db.groups.where('groupId').equals(gid).modify({ status: 'active' });
    document.getElementById('modal-root').innerHTML = '';
    render();
  }

  setInterval(() => {
    const n = new Date();
    document.getElementById('clock').textContent = n.toTimeString().slice(0,5);
    render();
  }, 10000);
  init();
</script>
</body>
</html>
