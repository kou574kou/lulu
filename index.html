/* ===== アニメーション ===== */
@keyframes pulse-ring {
  0%   { box-shadow: 0 0 0 0 rgba(167,139,250,.5); }
  70%  { box-shadow: 0 0 0 8px rgba(167,139,250,0); }
  100% { box-shadow: 0 0 0 0 rgba(167,139,250,0); }
}
@keyframes slide-up {
  from { transform: translateY(32px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes fade-in {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes toast-in {
  from { transform: translate(-50%, 12px); opacity: 0; }
  to   { transform: translate(-50%, 0);    opacity: 1; }
}

/* ===== 背景 ===== */
#bg-glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -5%, rgba(88,28,235,.2) 0%, transparent 65%);
}

/* ===== ヘッダー ===== */
#header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  height: 52px;
  background: rgba(6,6,14,.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(124,58,237,.25);
}
#logo { display: flex; align-items: center; gap: 8px; }
#logo-gem {
  color: #a78bfa; font-size: 17px;
  filter: drop-shadow(0 0 7px #7c3aed);
}
#logo-text {
  font-family: 'Cinzel', serif;
  font-size: 16px; font-weight: 700;
  letter-spacing: .15em; color: #e2e8f0;
}
#header-stats { display: flex; gap: 16px; align-items: center; }
.h-stat { text-align: center; }
.h-stat-num { font-size: 16px; font-weight: 700; line-height: 1; }
.h-stat-label { font-size: 9px; color: #475569; margin-top: 1px; letter-spacing: .04em; }

/* ===== フロア ===== */
#main { padding: 14px 12px 80px; position: relative; z-index: 1; }
.section-header {
  display: flex; align-items: center; gap: 7px;
  font-size: 10px; font-weight: 700; color: #64748b;
  letter-spacing: .12em; text-transform: uppercase;
  margin-bottom: 10px; margin-top: 4px;
}
.section-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #7c3aed; box-shadow: 0 0 7px #7c3aed;
  display: inline-block; flex-shrink: 0;
}
.table-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 9px; margin-bottom: 20px;
}

/* ===== 卓カード ===== */
.table-card {
  position: relative; border-radius: 13px;
  padding: 13px 13px 11px; cursor: pointer;
  border: 1px solid rgba(255,255,255,.07);
  background: rgba(15,15,25,.75);
  min-height: 110px;
  transition: transform .12s, box-shadow .12s;
  -webkit-tap-highlight-color: transparent;
}
.table-card:active { transform: scale(.97); }
.table-card.active {
  border-color: rgba(124,58,237,.5);
  background: rgba(124,58,237,.08);
}
.table-card.warn {
  border-color: rgba(245,158,11,.5);
  background: rgba(245,158,11,.06);
}
.table-card.over {
  border-color: rgba(239,68,68,.55);
  background: rgba(239,68,68,.07);
}
.card-pulse {
  position: absolute; top: 10px; right: 10px;
  width: 8px; height: 8px; border-radius: 50%;
  background: #7c3aed;
  animation: pulse-ring 2s infinite;
}
.card-pulse.warn  { background: #f59e0b; }
.card-pulse.over  { background: #ef4444; }
.card-name { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
.card-gid  { font-size: 10px; color: #7c3aed; margin-bottom: 7px; letter-spacing: .04em; }
.card-cr-tag { color: #fbbf24; margin-left: 5px; }
.card-stats { display: flex; gap: 6px; margin-bottom: 7px; }
.card-stat  { flex: 1; text-align: center; }
.card-stat-label { font-size: 8px; color: #475569; font-weight: 700; }
.card-stat-val   { font-size: 13px; font-weight: 700; color: #e2e8f0; }
.card-remaining  { font-size: 12px; font-weight: 700; text-align: center; color: #34d399; }
.card-remaining.warn { color: #fbbf24; }
.card-remaining.over { color: #f87171; }
.card-empty {

}
.card-empty-icon  { font-size: 24px; color: #1e293b; font-weight: 300; }

<div id="bg-glow"></div>

<header id="header">

    <span id="logo-text">NOCTUA</span>
  </div>

    </div>

      <div class="h-stat-num" id="stat-empty" style="color:#64748b">8</div>
      <div class="h-stat-label">空席</div>
    </div>
    <div class="h-stat">
      <div class="h-stat-num" id="stat-clock" style="color:#fbbf24">--:--</div>
      <div class="h-stat-label">現在時刻</div>
    </div>
  </div>
</header>

<!-- フロアマップ -->

<main id="main"></main>

<!-- モーダルコンテナ -->

<div id="modal-container"></div>

<footer id="footer">
  <span>IndexedDB (Dexie.js) — オフライン対応</span>
  <span style="color:#7c3aed">TAX 10% / SVC 10% / Card +10%</span>
</footer>

<script>
// ============================================================
// 定数
// ============================================================
const SET_MINUTES  = 40;
const SET_PRICE    = 3000;
const TAX_RATE     = 0.10;
const SERVICE_RATE = 0.10;
const CARD_TAX     = 0.10;

const SHIMEI_OPTIONS = [
  { label: '本指名', price: 3000 },
  { label: '場内',   price: 1500 },
  { label: '同伴',   price: 5000 },
];

const TABLES_MASTER = [
  { id:'T1', name:'1番卓', section:'VIP' },
  { id:'T2', name:'2番卓', section:'VIP' },
  { id:'T3', name:'3番卓', section:'メイン' },
  { id:'T4', name:'4番卓', section:'メイン' },
  { id:'T5', name:'5番卓', section:'メイン' },
  { id:'T6', name:'6番卓', section:'カウンター' },
  { id:'T7', name:'7番卓', section:'カウンター' },
  { id:'T8', name:'8番卓', section:'カウンター' },
];

// ============================================================
// Dexie DB
// ============================================================
const db = new Dexie('KyabakuraDB');
db.version(1).stores({
  visit_groups:     '++id, group_id, status',
  visit_histories:  '++id, group_id, table_id, check_in, is_cr',
  guest_count_logs: '++id, group_id, history_id',
  billing_records:  '++id, group_id',
});

// ============================================================
// ユーティリティ
// ============================================================
function generateGroupId(existingIds) {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const prefix = `${y}${m}${d}`;
  const nums = existingIds
    .filter(id => id.startsWith(prefix))
    .map(id => parseInt((id.split('-')[1])||'0'))
    .filter(n => !isNaN(n));
  const next = nums.length > 0 ? Math.max(...nums)+1 : 1;
  return `${prefix}-${String(next).padStart(3,'0')}`;
}

function calcSets(histories) {
  if (!histories.length) return 0;
  const h0 = histories[0];
  if (h0.manual_sets != null) return h0.manual_sets;
  const totalMs = histories.reduce((acc,h) => {
    const inn = new Date(h.check_in).getTime();
    const out = h.check_out ? new Date(h.check_out).getTime() : Date.now();
    return acc + Math.max(0, out - inn);
  }, 0);
  return Math.max(1, Math.ceil(totalMs / 60000 / SET_MINUTES));
}

function calcBilling(sets, billingCount, shimeiPrice, foodAmount) {
  const subtotal  = SET_PRICE * billingCount * sets + shimeiPrice + foodAmount;
  const cashTotal = Math.round(subtotal * (1+SERVICE_RATE) * (1+TAX_RATE));
  const cardTotal = Math.round(cashTotal * (1+CARD_TAX));
  return { subtotal, cashTotal, cardTotal };
}

function fmtTime(iso) {
  if (!iso) return '--:--';
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function fmtYen(n) {
  return `¥${Number(n).toLocaleString('ja-JP')}`;
}

function calcRemaining(checkIn, sets) {
  const expected = new Date(checkIn).getTime() + sets * SET_MINUTES * 60000;
  return Math.round((expected - Date.now()) / 60000);
}

function fmtRemaining(min) {
  if (min <= 0) return { text:`超過 ${Math.abs(min)}分`, cls:'over' };
  if (min < 15) return { text:`残 ${min}分`, cls:'warn' };
  if (min < 60) return { text:`残 ${min}分`, cls:'' };
  return { text:`残 ${Math.floor(min/60)}h${min%60}m`, cls:'' };
}

let toastTimer = null;
function showToast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type==='err'  ? 'rgba(220,38,38,.92)'
                       : type==='info' ? 'rgba(109,40,217,.92)'
                       : 'rgba(5,150,105,.92)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display='none'; }, 3000);
}

// ============================================================
// アプリ状態
// ============================================================
let state = {
  selectedTableId: null,
  modalType: null,  // 'new'|'manage'|'billing'|'cr'
  newCount: 2,
  newMemo: '',
  crSearch: '',
  billConfirmed: false,
  // DBから取得したキャッシュ
  groups: [],
  histories: [],
  logs: [],
};

// ============================================================
// DB取得 → 再描画
// ============================================================
async function loadAndRender() {
  state.groups    = await db.visit_groups.toArray();
  state.histories = await db.visit_histories.toArray();
  state.logs      = await db.guest_count_logs.toArray();
  renderFloor();
  renderModal();
  updateHeader();
}

// ============================================================
// ヘッダー更新
// ============================================================
function updateHeader() {
  const activeIds = new Set(state.histories.filter(h=>!h.check_out).map(h=>h.table_id));
  document.getElementById('stat-active').textContent = activeIds.size;
  document.getElementById('stat-empty').textContent  = TABLES_MASTER.length - activeIds.size;
  const now = new Date();
  document.getElementById('stat-clock').textContent  =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

// ============================================================
// フロアマップ描画
// ============================================================
function getActiveHistory(tableId) {
  return state.histories.find(h => h.table_id===tableId && !h.check_out);
}
function getGroupHistories(groupId) {
  return state.histories.filter(h => h.group_id===groupId);
}

function renderFloor() {
  const sections = [...new Set(TABLES_MASTER.map(t=>t.section))];
  const closedGroups = state.groups.filter(g=>g.status==='closed');
  let html = '';
  sections.forEach(section => {
    html += `<div class="section-header"><span class="section-dot"></span>${section}</div>`;
    html += '<div class="table-grid">';
    TABLES_MASTER.filter(t=>t.section===section).forEach(table => {
      const h = getActiveHistory(table.id);
      const isActive = !!h;
      if (isActive) {
        const gHistories = getGroupHistories(h.group_id);
        const sets = calcSets(gHistories);
        const rem  = calcRemaining(h.check_in, sets);
        const remFmt = fmtRemaining(rem);
        const cls = remFmt.cls;
        html += `
          <div class="table-card active ${cls}" onclick="openManage('${table.id}')">
            <span class="card-pulse ${cls}"></span>
            <div class="card-name">${table.name}</div>
            <div class="card-gid">${h.group_id}${h.is_cr?'<span class="card-cr-tag">CR</span>':''}</div>
            <div class="card-stats">
              <div class="card-stat">
                <div class="card-stat-label">現在</div>
                <div class="card-stat-val">${h.current_count}<small>名</small></div>
              </div>
              <div class="card-stat">
                <div class="card-stat-label">課金</div>
                <div class="card-stat-val" style="color:#fbbf24">${h.billing_count}<small>名</small></div>
              </div>
              <div class="card-stat">
                <div class="card-stat-label">SET</div>
                <div class="card-stat-val" style="color:#a78bfa">${sets}</div>
              </div>
            </div>
            <div class="card-remaining ${cls}">${remFmt.text}</div>
          </div>`;
      } else {
        const hasCR = closedGroups.length > 0;
        html += `
          <div class="table-card" onclick="openNew('${table.id}')">
            <div class="card-name">${table.name}</div>
            <span class="card-empty-badge">空席</span>
            <div class="card-empty">
              <div class="card-empty-icon">+</div>
              <div class="card-empty-label">案内する</div>
            </div>
            ${hasCR ? `<button class="cr-float-btn" onclick="event.stopPropagation();openCR('${table.id}')">CR</button>` : ''}
          </div>`;
      }
    });
    html += '</div>';
  });
  document.getElementById('main').innerHTML = html;
}

// ============================================================
// モーダル描画
// ============================================================
function renderModal() {
  const container = document.getElementById('modal-container');
  if (!state.modalType) { container.innerHTML=''; return; }

  let content = '';
  if      (state.modalType==='new')     content = renderNewModal();
  else if (state.modalType==='manage')  content = renderManageModal();
  else if (state.modalType==='billing') content = renderBillingModal();
  else if (state.modalType==='cr')      content = renderCRModal();

  container.innerHTML = `
    <div class="modal-overlay" onclick="closeModal()">
      <div class="modal-sheet" onclick="event.stopPropagation()">
        ${content}
      </div>
    </div>`;
}

function closeModal() {
  state.modalType = null;
  state.billConfirmed = false;
  renderModal();
}

// 操作ハンドラ（グローバル関数）

function openNew(tableId) {

}
function openManage(tableId) {

  state.modalType = 'manage';
  renderModal();
}
function openManage2() {
  state.modalType = 'manage';
  state.billConfirmed = false;
  renderModal();
}
function openBilling() {
  state.modalType = 'billing';
  state.billConfirmed = false;
  renderModal();
}
function openCR(tableId) {
  state.selectedTableId = tableId;
  state.modalType = 'cr';
  state.crSearch = '';
  renderModal();
}

function setNewCount(n) {
  state.newCount = n;
  renderModal();
}

async function doNewEntry() {
  const allIds  = state.groups.map(g=>g.group_id);
  const groupId = generateGroupId(allIds);
  const now     = new Date().toISOString();
  const count   = state.newCount;

  await db.transaction('rw', [db.visit_groups, db.visit_histories, db.guest_count_logs], async () => {
    await db.visit_groups.add({ group_id:groupId, status:'active', memo:state.newMemo, created_at:now, updated_at:now });
    const hid = await db.visit_histories.add({
      group_id:groupId, table_id:state.selectedTableId,
      check_in:now, entry_count:count, current_count:count, billing_count:count,
      set_minutes:SET_MINUTES, manual_sets:null, is_cr:false, sequence:1,
      shimei_label:null, shimei_price:0, food_amount:0,
    });
    await db.guest_count_logs.add({
      group_id:groupId, history_id:hid,
      change_type:'entry', delta:count,
      current_count:count, billing_count:count, logged_at:now,
    });
  });
  closeModal();
  showToast(`${groupId} 入店処理完了`);
  await loadAndRender();
}

async function doCount(delta, type) {
  const h = getActiveHistory(state.selectedTableId);
  if (!h || h.id==null) return;
  const newCurrent = Math.max(1, h.current_count + (type==='leave' ? -delta : delta));
  const newBilling = type==='join' ? h.billing_count + delta : h.billing_count;
  const now = new Date().toISOString();
  await db.transaction('rw',[db.visit_histories,db.guest_count_logs], async()=>{
    await db.visit_histories.update(h.id, { current_count:newCurrent, billing_count:newBilling });
    await db.guest_count_logs.add({
      group_id:h.group_id, history_id:h.id,
      change_type:type, delta, current_count:newCurrent, billing_count:newBilling, logged_at:now,
    });
  });
  showToast(type==='join'?`+${delta}名 合流`:`-${delta}名 退席`, 'info');
  await loadAndRender();
}

async function doShimei(label, price) {
  const h = getActiveHistory(state.selectedTableId);
  if (!h || h.id==null) return;
  const same = h.shimei_label === label;
  await db.visit_histories.update(h.id, {
    shimei_label: same ? null : label,
    shimei_price: same ? 0    : price,
  });
  await loadAndRender();
}

async function doFood(val) {
  const h = getActiveHistory(state.selectedTableId);
  if (!h || h.id==null) return;
  const n = parseInt(val.replace(/[^0-9]/g,''))||0;
  await db.visit_histories.update(h.id, { food_amount:n });
  await loadAndRender();
}

async function doManualSets(val) {
  const h = getActiveHistory(state.selectedTableId);
  if (!h || h.id==null) return;
  const n = val==='' ? null : Math.max(1, parseInt(val)||1);
  await db.visit_histories.update(h.id, { manual_sets:n });
  await loadAndRender();
}

async function doBillingConfirm() {
  if (!state.billConfirmed) return;
  const h = getActiveHistory(state.selectedTableId);
  if (!h || h.id==null) return;
  const gHistories = getGroupHistories(h.group_id);
  const sets       = calcSets(gHistories);
  const shimeiPrice= h.shimei_price||0;
  const foodAmount = h.food_amount||0;
  const bill       = calcBilling(sets, h.billing_count, shimeiPrice, foodAmount);
  const now        = new Date().toISOString();

  await db.transaction('rw',[db.visit_groups,db.visit_histories,db.billing_records], async()=>{
    await db.visit_histories.update(h.id, { check_out:now });
    await db.visit_groups.where('group_id').equals(h.group_id).modify({ status:'closed', updated_at:now });
    await db.billing_records.add({
      group_id:h.group_id, history_id:h.id,
      sets, billing_count:h.billing_count,
      shimei_price:shimeiPrice, food_amount:foodAmount,
      subtotal:bill.subtotal, cash_total:bill.cashTotal, card_total:bill.cardTotal,
      confirmed_at:now,
    });
  });
  closeModal();
  showToast(`${h.group_id} 会計完了 ${fmtYen(bill.cashTotal)}`);
  await loadAndRender();
}

async function doCREntry(groupId) {
  const g  = state.groups.find(x=>x.group_id===groupId);
  if (!g) return;
  const gH = getGroupHistories(groupId);
  const lastH = gH[gH.length-1];
  const prevBilling = lastH ? lastH.billing_count : 2;
  const now = new Date().toISOString();

  await db.transaction('rw',[db.visit_groups,db.visit_histories], async()=>{
    await db.visit_groups.where('group_id').equals(groupId).modify({ status:'active', updated_at:now });
    await db.visit_histories.add({
      group_id:groupId, table_id:state.selectedTableId,
      check_in:now, entry_count:2, current_count:2, billing_count:prevBilling,
      set_minutes:SET_MINUTES, manual_sets:null, is_cr:true, sequence:gH.length+1,
      shimei_label:null, shimei_price:0, food_amount:0,
    });
  });
  closeModal();
  showToast(`${groupId} CR再入店`, 'info');
  await loadAndRender();
}

// ============================================================
// 定期更新（残り時間の再計算）
// ============================================================
setInterval(async () => {
  await loadAndRender();
}, 30000);

// ============================================================
// 起動
// ============================================================
loadAndRender();
</script>
